name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Shared build: install + build all packages ───────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/*/dist/
            node_modules/.cache/
          retention-days: 1

  # ─── Unit tests (parallel, reuse build) ───────────────────────────
  test-core:
    name: Test Core
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-output
      - run: npm run test --workspace=@soleri/core
      - run: npm run typecheck --workspace=@soleri/core

  test-forge:
    name: Test Forge
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-output
      - run: npm run test --workspace=@soleri/forge
      - run: npm run typecheck --workspace=@soleri/forge

  test-cli:
    name: Test CLI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-output
      - run: npm run test --workspace=@soleri/cli
      - run: npm run typecheck --workspace=@soleri/cli

  test-create-soleri:
    name: Test create-soleri
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-output
      - run: npm run typecheck --workspace=create-soleri

  # ─── E2E tests (full build, virgin environment) ──────────────────
  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: build-output
      - run: npm run build
      - run: npm run test:e2e

  # ─── Code quality (parallel with tests) ──────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Format check (oxfmt)
        run: npm run format:check

      - name: Secret scan
        run: npm run secrets:check

      - name: Markdown lint
        run: npm run lint:md

      - name: Spell check
        run: npm run lint:spell

      - name: Dead code (knip)
        run: npm run deadcode:knip
        continue-on-error: true

  # ─── Website content validation ──────────────────────────────────
  website:
    name: Validate Website Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate i18n content files exist
        run: |
          for file in home getting-started how-it-works personas teams; do
            test -f "src/i18n/pages/${file}.ts" || { echo "Missing src/i18n/pages/${file}.ts"; exit 1; }
          done
          echo "All i18n content files present."

      - name: Validate docs exist
        run: |
          for file in getting-started your-agent capabilities extending cli-reference; do
            test -f "src/content/docs/docs/${file}.md" || { echo "Missing docs/${file}.md"; exit 1; }
          done
          echo "All doc files present."
