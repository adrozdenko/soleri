name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Shared build: install + build all packages ───────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=@soleri/core
      - run: npm run build --workspace=@soleri/forge
      - run: npm run build --workspace=@soleri/cli
      - run: npm run build --workspace=create-soleri
      - run: npm run build --if-present --workspaces
      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            packages/*/dist/
            node_modules/.cache/
          retention-days: 1

  # ─── Unit tests (parallel, reuse build) ───────────────────────────
  test-core:
    name: Test Core
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - name: Run tests with coverage
        run: npm run test:coverage --workspace=@soleri/core

      - name: Coverage summary
        if: always()
        run: |
          SUMMARY_FILE="packages/core/coverage/coverage-summary.json"
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "⚠️ No coverage summary found" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "## Coverage Report — @soleri/core" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('$SUMMARY_FILE', 'utf-8'));
            const t = data.total;
            const fmt = (m) => m.pct.toFixed(1) + '% (' + m.covered + '/' + m.total + ')';
            const lines = [
              '| Metric | Coverage |',
              '|--------|----------|',
              '| **Statements** | ' + fmt(t.statements) + ' |',
              '| **Branches** | ' + fmt(t.branches) + ' |',
              '| **Functions** | ' + fmt(t.functions) + ' |',
              '| **Lines** | ' + fmt(t.lines) + ' |',
            ];
            console.log(lines.join('\n'));
          " >> "$GITHUB_STEP_SUMMARY"

      - run: npm run typecheck --workspace=@soleri/core

  test-forge:
    name: Test Forge
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - run: npm run test --workspace=@soleri/forge
      - run: npm run typecheck --workspace=@soleri/forge

  test-cli:
    name: Test CLI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - run: npm run test --workspace=@soleri/cli
      - run: npm run typecheck --workspace=@soleri/cli

  test-create-soleri:
    name: Test create-soleri
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - run: npm run typecheck --workspace=create-soleri

  # ─── Domain pack tests (matrix) ───────────────────────────────────
  test-domains:
    name: Test ${{ matrix.package }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - '@soleri/domain-code-review'
          - '@soleri/domain-component'
          - '@soleri/domain-design-qa'
          - '@soleri/domain-design'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - name: Build domain pack
        run: npm run build --workspace=${{ matrix.package }}
      - name: Run tests
        run: npm run test --workspace=${{ matrix.package }}

  # ─── Cross-platform tests (Linux, Windows, macOS) ────────────────
  test-cross-platform:
    name: Test ${{ matrix.os }} (Core + Forge + CLI)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=@soleri/core
      - run: npm run build --workspace=@soleri/forge
      - run: npm run build --workspace=@soleri/cli
      - run: npm run test --workspace=@soleri/core
      - run: npm run test --workspace=@soleri/forge
      - run: npm run test --workspace=@soleri/cli

  # ─── E2E tests (full build, virgin environment) ──────────────────
  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: build-output
      - run: npm run build --workspace=@soleri/core
      - run: npm run build --workspace=@soleri/forge
      - run: npm run build --workspace=@soleri/cli
      - run: npm run build --workspace=create-soleri
      - run: npm run test:e2e

  # ─── Smoke test: scaffold → install → typecheck ─────────────────
  smoke-test:
    name: Smoke Test (scaffold + build)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Scaffold agent via create-soleri
        run: |
          SMOKE_DIR="$(mktemp -d)"
          echo "SMOKE_DIR=$SMOKE_DIR" >> "$GITHUB_ENV"
          AGENT_DIR="$SMOKE_DIR/smoke-ci-agent"
          echo "AGENT_DIR=$AGENT_DIR" >> "$GITHUB_ENV"

          cat > "$SMOKE_DIR/config.json" <<'CONF'
          {
            "id": "smoke-ci-agent",
            "name": "Smoke CI Agent",
            "role": "CI smoke test agent",
            "description": "Scaffolded in CI to verify template compilation.",
            "domains": ["testing"],
            "principles": ["Fail fast"],
            "greeting": "Ready to assist."
          }
          CONF

          # Patch outputDir into the config (cannot be set via CLI flag for legacy)
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('$SMOKE_DIR/config.json', 'utf-8'));
            cfg.outputDir = '$SMOKE_DIR';
            fs.writeFileSync('$SMOKE_DIR/config.json', JSON.stringify(cfg, null, 2));
          "

          node packages/create-soleri/dist/main.js --config "$SMOKE_DIR/config.json" --legacy

      - name: Patch @soleri/core to local workspace
        run: |
          cd "$AGENT_DIR"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.dependencies['@soleri/core'] = 'file:${{ github.workspace }}/packages/core';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Install dependencies
        run: npm install --ignore-scripts
        working-directory: ${{ env.AGENT_DIR }}

      - name: Resolve MCP SDK duplicate
        run: |
          # file: link to @soleri/core brings the monorepo's @modelcontextprotocol/sdk.
          # The agent also installs its own copy, causing duplicate type declarations.
          # Replace the agent's copy with a symlink to the monorepo's copy.
          rm -rf node_modules/@modelcontextprotocol/sdk
          ln -s "${{ github.workspace }}/node_modules/@modelcontextprotocol/sdk" \
            node_modules/@modelcontextprotocol/sdk
        working-directory: ${{ env.AGENT_DIR }}

      - name: Typecheck scaffolded agent
        run: npx tsc --noEmit
        working-directory: ${{ env.AGENT_DIR }}

      - name: Cleanup
        if: always()
        run: rm -rf "$SMOKE_DIR"

  # ─── Code quality (parallel with tests) ──────────────────────────
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Format check (oxfmt)
        run: npm run format:check

      - name: Secret scan
        run: npm run secrets:check

      - name: Markdown lint
        run: npm run lint:md

      - name: Spell check
        run: npm run lint:spell

      - name: Dead code (knip)
        run: npm run deadcode:knip

  # ─── Website content validation ──────────────────────────────────
  website:
    name: Validate Website Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate i18n content files exist
        run: |
          for file in home getting-started how-it-works personas teams; do
            test -f "src/i18n/pages/${file}.ts" || { echo "Missing src/i18n/pages/${file}.ts"; exit 1; }
          done
          echo "All i18n content files present."

      - name: Validate docs exist
        run: |
          for file in getting-started your-agent capabilities extending cli-reference; do
            test -f "src/content/docs/docs/${file}.md" || { echo "Missing docs/${file}.md"; exit 1; }
          done
          echo "All doc files present."
