name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Build + unit tests ─────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=@soleri/core

      - name: Test core
        run: npm run test --workspace=@soleri/core

      - name: Build forge
        run: npm run build --workspace=@soleri/forge

      - name: Test forge
        run: npm run test --workspace=@soleri/forge

      - name: Build CLI
        run: npm run build --workspace=@soleri/cli

      - name: Test CLI
        run: npm run test --workspace=@soleri/cli

      - name: Build create-soleri
        run: npm run build --workspace=create-soleri

      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/*/dist/
          retention-days: 1

  # ─── E2E tests (must pass before publish) ────────────────────────────
  e2e:
    name: E2E Tests
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Rebuild all packages
        run: |
          npm run build --workspace=@soleri/core
          npm run build --workspace=@soleri/forge
          npm run build --workspace=@soleri/cli
          npm run build --workspace=create-soleri

      - name: Run E2E tests
        run: npm run test:e2e

  # ─── Publish (gated on E2E) ─────────────────────────────────────────
  publish:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Rebuild all packages
        run: |
          npm run build --workspace=@soleri/core
          npm run build --workspace=@soleri/forge
          npm run build --workspace=@soleri/cli
          npm run build --workspace=create-soleri

      - name: Publish @soleri/core
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! npm publish --workspace=@soleri/core --access public >"$log" 2>&1; then
            if grep -q "previously published" "$log"; then
              echo "Already published — skipping"
            else
              cat "$log"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @soleri/forge
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! npm publish --workspace=@soleri/forge --access public >"$log" 2>&1; then
            if grep -q "previously published" "$log"; then
              echo "Already published — skipping"
            else
              cat "$log"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @soleri/cli
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! npm publish --workspace=@soleri/cli --access public >"$log" 2>&1; then
            if grep -q "previously published" "$log"; then
              echo "Already published — skipping"
            else
              cat "$log"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-soleri
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! npm publish --workspace=create-soleri --access public >"$log" 2>&1; then
            if grep -q "previously published" "$log"; then
              echo "Already published — skipping"
            else
              cat "$log"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
