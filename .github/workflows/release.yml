name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Build + unit tests ─────────────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace=@soleri/core

      - name: Test core
        run: npm run test --workspace=@soleri/core

      - name: Build forge
        run: npm run build --workspace=@soleri/forge

      - name: Test forge
        run: npm run test --workspace=@soleri/forge

      - name: Build CLI
        run: npm run build --workspace=@soleri/cli

      - name: Test CLI
        run: npm run test --workspace=@soleri/cli

      - name: Build create-soleri
        run: npm run build --workspace=create-soleri

      - uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            packages/*/dist/
          retention-days: 1

  # ─── E2E tests (must pass before publish) ────────────────────────────
  e2e:
    name: E2E Tests
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Rebuild all packages
        run: |
          npm run build --workspace=@soleri/core
          npm run build --workspace=@soleri/forge
          npm run build --workspace=@soleri/cli
          npm run build --workspace=create-soleri

      - name: Run E2E tests
        run: npm run test:e2e

  # ─── Publish (gated on E2E) ─────────────────────────────────────────
  publish:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v8
        with:
          name: build-output

      - name: Rebuild all packages
        run: |
          npm run build --workspace=@soleri/core
          npm run build --workspace=@soleri/forge
          npm run build --workspace=@soleri/cli
          npm run build --workspace=create-soleri

      - name: Publish @soleri/core
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! npm publish --workspace=@soleri/core --access public >"$log" 2>&1; then
            if grep -qE "previously published|You cannot publish over|EPUBLISHCONFLICT" "$log"; then
              echo "Already published — skipping"
              cat "$log"
            else
              cat "$log"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @soleri/forge
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! npm publish --workspace=@soleri/forge --access public >"$log" 2>&1; then
            if grep -qE "previously published|You cannot publish over|EPUBLISHCONFLICT" "$log"; then
              echo "Already published — skipping"
              cat "$log"
            else
              cat "$log"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @soleri/cli
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! npm publish --workspace=@soleri/cli --access public >"$log" 2>&1; then
            if grep -qE "previously published|You cannot publish over|EPUBLISHCONFLICT" "$log"; then
              echo "Already published — skipping"
              cat "$log"
            else
              cat "$log"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-soleri
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! npm publish --workspace=create-soleri --access public >"$log" 2>&1; then
            if grep -qE "previously published|You cannot publish over|EPUBLISHCONFLICT" "$log"; then
              echo "Already published — skipping"
              cat "$log"
            else
              cat "$log"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate changelog from conventional commits
        id: changelog
        run: |
          # Find the previous tag
          CURRENT_TAG="${GITHUB_REF#refs/tags/}"
          PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            # First release or no previous tag — use all commits
            RANGE="$CURRENT_TAG"
          else
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          fi

          echo "Generating changelog for $RANGE"

          # Categorize commits by conventional commit prefix
          FEATURES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^feat" --extended-regexp | grep -v "^$" || true)
          FIXES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^fix" --extended-regexp | grep -v "^$" || true)
          PERF=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^perf" --extended-regexp | grep -v "^$" || true)
          DOCS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^docs" --extended-regexp | grep -v "^$" || true)
          REFACTOR=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^refactor" --extended-regexp | grep -v "^$" || true)
          CI_CHANGES=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^ci" --extended-regexp | grep -v "^$" || true)
          TESTS=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^test" --extended-regexp | grep -v "^$" || true)
          CHORE=$(git log "$RANGE" --pretty=format:"- %s (%h)" --grep="^chore" --extended-regexp | grep -v "^$" || true)

          # Build the changelog body
          BODY=""

          if [ -n "$FEATURES" ]; then
            BODY="${BODY}## Features\n\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Bug Fixes\n\n${FIXES}\n\n"
          fi
          if [ -n "$PERF" ]; then
            BODY="${BODY}## Performance\n\n${PERF}\n\n"
          fi
          if [ -n "$REFACTOR" ]; then
            BODY="${BODY}## Refactoring\n\n${REFACTOR}\n\n"
          fi
          if [ -n "$TESTS" ]; then
            BODY="${BODY}## Tests\n\n${TESTS}\n\n"
          fi
          if [ -n "$CI_CHANGES" ]; then
            BODY="${BODY}## CI/CD\n\n${CI_CHANGES}\n\n"
          fi
          if [ -n "$DOCS" ]; then
            BODY="${BODY}## Documentation\n\n${DOCS}\n\n"
          fi
          if [ -n "$CHORE" ]; then
            BODY="${BODY}## Maintenance\n\n${CHORE}\n\n"
          fi

          # Fallback if no conventional commits found
          if [ -z "$BODY" ]; then
            BODY="## Changes\n\n$(git log "$RANGE" --pretty=format:'- %s (%h)' | grep -v '^$')\n"
          fi

          # Write to file (handles multiline safely)
          printf '%b' "$BODY" > "$RUNNER_TEMP/changelog.md"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ runner.temp }}/changelog.md
