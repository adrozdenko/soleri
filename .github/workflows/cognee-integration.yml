name: Cognee Integration

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  cognee-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      cognee:
        image: cognee/cognee:latest
        ports:
          - 8000:8000
        env:
          AUTH_REQUIRED: 'false'
          LLM_PROVIDER: 'ollama'
          EMBEDDING_PROVIDER: 'ollama'
        options: >-
          --health-cmd "curl -f http://localhost:8000/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: cd packages/core && npm run build

      - name: Run Cognee integration tests
        run: cd packages/core && npx vitest run src/__tests__/cognee-integration.test.ts
        env:
          COGNEE_BASE_URL: http://localhost:8000
