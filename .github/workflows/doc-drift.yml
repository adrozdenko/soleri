name: Doc Drift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  doc-drift:
    name: Doc Drift
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Detector unit tests
        run: npm run docs:check-drift:test
      - name: Run drift check
        run: npm run docs:check-drift
