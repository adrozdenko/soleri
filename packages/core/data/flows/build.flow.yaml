# Build Component Flow
# Orchestrates component creation with vault-first knowledge and architecture guidance.

id: BUILD-flow
name: Build Component
description: >
  Full component build workflow: search vault for patterns, gather architecture
  guidance and brain recommendations, then plan the implementation.
version: '1.0.0'
on-missing-capability:
  default: skip-with-warning
  blocking: [vault.search]

triggers:
  modes:
    - BUILD
    - component-build
  contexts:
    - component
    - feature
    - ui
  min-confidence: MEDIUM

steps:
  - id: search-vault
    name: Search Vault Patterns
    description: Search vault for existing patterns, anti-patterns, and prior art related to the build target.
    needs: [vault.search, memory.search]
    chains:
      - vault-search
      - memory-search
    output:
      - vault-patterns
      - memory-hits

  - id: get-architecture
    name: Get Architecture Guidance
    description: Fetch architecture patterns and brain recommendations in parallel.
    needs: [architecture.search, brain.recommend]
    chains:
      - architecture-search
      - brain-recommend
    parallel: true
    output:
      - architecture-patterns
      - brain-recommendations

on-error:
  default:
    action: STOP
    message: 'Build flow encountered an error.'
    recovery: 'Retry from the failed step.'
  max-retries: 2
  escalation:
    action: STOP
    message: 'Build flow failed after retries. Escalate to user.'

overrides:
  - match: \b(button|icon|badge|chip|tag|pill)\b
    matchFlags: i
    context: small-component
    skipSteps: [get-architecture]
    injectBefore:
      validate: [button-semantics-check]

  - match: \b(page|layout|dashboard|screen|view)\b
    matchFlags: i
    context: large-component
    injectBefore:
      validate: [responsive-patterns]
    injectAfter:
      validate: [performance-check]

  - match: \b(form|input|select|textarea|checkbox|radio|switch|dropdown)\b
    matchFlags: i
    context: form-component
    injectBefore:
      validate: [defensive-design, accessibility-precheck]

  - match: \b(modal|dialog|sheet|drawer|popover|overlay|tooltip)\b
    matchFlags: i
    context: container-component
    injectBefore:
      validate: [container-pattern-check, dialog-patterns]

metadata:
  author: soleri
  domain: component-build
  tags:
    - build
    - component
    - vault-first
