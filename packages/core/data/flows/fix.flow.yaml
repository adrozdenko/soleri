# Fix Issue Flow
# Orchestrates bug fixing with anti-pattern awareness and brain recommendations.

id: FIX-flow
name: Fix Issue
description: >
  Issue fix workflow: search for known anti-patterns, then gather error patterns
  and brain recommendations in parallel.
version: '1.0.0'
on-missing-capability:
  default: skip-with-warning
  blocking: [vault.search]

triggers:
  modes:
    - FIX
    - bug-fix
  contexts:
    - bug
    - error
    - regression
  min-confidence: MEDIUM

steps:
  - id: search-anti-patterns
    name: Search Anti-Patterns
    description: Search vault for known anti-patterns related to the reported issue.
    needs: [vault.search, memory.search]
    chains:
      - vault-search
      - memory-search
    output:
      - anti-patterns
      - memory-hits

  - id: get-error-patterns
    name: Get Error Patterns
    description: Gather error patterns and brain insights in parallel.
    needs: [debug.patterns, brain.recommend]
    chains:
      - error-pattern-search
      - brain-recommend
    parallel: true
    output:
      - error-patterns
      - brain-recommendations

on-error:
  default:
    action: STOP
    message: 'Fix flow encountered an error.'
    recovery: 'Retry from the failed step.'
  max-retries: 2

metadata:
  author: soleri
  domain: bug-fix
  tags:
    - fix
    - bug
    - anti-pattern
