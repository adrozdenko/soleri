# Code Review Flow
# Orchestrates code review with vault pattern lookup and brain recommendations.

id: REVIEW-flow
name: Code Review
description: >
  Code review workflow: search vault for known review anti-patterns and rules,
  then surface brain recommendations and architecture guidance.
version: '1.0.0'
on-missing-capability:
  default: skip-with-warning
  blocking: [vault.search]

triggers:
  modes:
    - REVIEW
    - code-review
  contexts:
    - pull-request
    - code-quality
    - review
  min-confidence: MEDIUM

steps:
  - id: search-vault
    name: Search Vault Patterns
    description: Search vault for known review anti-patterns and rules.
    needs: [vault.search, memory.search]
    chains:
      - vault-search
      - memory-search
    output:
      - vault-patterns
      - memory-hits

  - id: get-architecture
    name: Get Architecture Guidance
    description: Fetch architecture patterns and brain recommendations for the review.
    needs: [architecture.search, brain.recommend]
    chains:
      - architecture-search
      - brain-recommend
    parallel: true
    output:
      - architecture-patterns
      - brain-recommendations

on-error:
  default:
    action: CONTINUE
    message: 'Review step failed; continuing with remaining checks.'
  max-retries: 1

metadata:
  author: soleri
  domain: code-review
  tags:
    - review
    - quality
