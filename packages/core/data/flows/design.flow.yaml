# Design Flow
# Orchestrates design knowledge queries: vault patterns, stack guidelines, brain recommendations.

id: DESIGN-flow
name: Design Guidance
description: >
  Design workflow: search vault for existing design patterns and decisions,
  retrieve stack implementation guidelines, then surface brain recommendations.
version: '1.0.0'
on-missing-capability:
  default: skip-with-warning
  blocking: [vault.search]

triggers:
  modes:
    - DESIGN
  contexts:
    - design
    - style
    - typography
    - theme
  min-confidence: MEDIUM

steps:
  - id: search-vault-design
    name: Search Vault Design Patterns
    description: Search vault for existing design patterns, decisions, and anti-patterns related to the request.
    needs: [vault.search, memory.search]
    chains:
      - vault-search
      - memory-search
    output:
      - vault-patterns
      - memory-hits

  - id: get-stack-guidelines
    name: Get Stack Guidelines
    description: Retrieve implementation guidelines for the target tech stack.
    needs: [stack.guidelines]
    chains:
      - get-stack-guidelines
    output:
      - stack-guidelines

  - id: brain-recommend
    name: Brain Recommendations
    description: Check brain for proven design patterns from previous sessions.
    needs: [brain.recommend]
    chains:
      - brain-recommend
    output:
      - brain-recommendations

on-error:
  default:
    action: CONTINUE
    message: 'Design step encountered an error. Continuing with available data.'
  max-retries: 1

metadata:
  author: soleri
  domain: design
  tags:
    - design
    - style
    - color
    - typography
    - vault-first
